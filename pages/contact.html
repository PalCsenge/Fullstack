<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapcsolat</title>
</head>
<body>
    <h1>Kapcsolat</h1>

    <a href="../index.html">Főoldal</a>
    <hr>

    <form action="POST">
        <label for="full_name">Teljes név:</label>
        <input type="text" id="full_name">
        <br>
        
        <label for="email">Email:</label>
        <input type="email" id="email">
        <br>

        <p>Azonosítás:</p>
            <input type="radio" id="hallgato">
            <label for="hallgato">hallgató</label>
            <br>

            <input type="radio" id="oktato">
            <label for="oktato">oktató</label>
            <br>
            
            <input type="radio" id="kulsos">
            <label for="kulsos">külsős személy vagyok</label>
            <br>

        <label for="uzenet_targy">Üzenet tárgya:</label>
        <input type="text" id="uzenet_targy">
        <br>

        <label for="uzenet_szovege">Üzenet szövege</label>
        <input type="text" size="100">
        <br>

        <button type="submit">Küldés</button>
    </form>

    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1905.38779395055!2d19.03713853280239!3d47.516693124280884!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4741dc0215ef3f7d%3A0xc11b28f218965f53!2zR8O8bCBCYWJhIFTDvHJiZSDDqXMgUsOzenNha2VydA!5e0!3m2!1shu!2shu!4v1773149678934!5m2!1shu!2shu" width="400" height="300" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
</body>
</html>
